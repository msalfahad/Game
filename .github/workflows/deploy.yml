# Deploy Bash Arena to GitHub Pages so you can preview the game from any
# device (phone/tablet/desktop) at https://msalfahad.github.io/Game/
#
# Publishes the build to a `gh-pages` branch. GitHub automatically enables
# Pages for a repo when a gh-pages branch appears, so no settings step or
# admin-scoped token is needed (the Actions token cannot create a Pages site
# via the API, which is why the artifact-based deploy failed).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/awaiting-info-wfsny5]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/build-single.mjs
      - name: Publish dist to gh-pages branch
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
